# SkipQ v2 — Docker Infrastructure
# Start: docker compose up -d
# Stop:  docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: skipq-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: skipq
      POSTGRES_USER: skipq
      POSTGRES_PASSWORD: skipq_dev_password
    volumes:
      - skipq_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: skipq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - skipq_redisdata:/data

volumes:
  skipq_pgdata:
  skipq_redisdata:
